services:
  alarm-service:
    build: .
    container_name: fox-coin-alarm-service
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${OFFLINE_PAY_SSH_KEY_SOURCE:-/home/ubuntu/.ssh/korion.pem}:${OFFLINE_PAY_SSH_KEY_PATH:-/run/secrets/korion.pem}:ro
